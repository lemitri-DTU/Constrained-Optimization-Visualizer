<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Constrained Optimization Visualizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.26.0/plotly.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:       #080b14;
    --panel:    #0d1220;
    --border:   #1e2840;
    --accent:   #4f9eff;
    --accent2:  #ff6b6b;
    --accent3:  #3dffc0;
    --text:     #c8d4f0;
    --muted:    #4a5a80;
    --input-bg: #111827;
    --radius:   10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, #0d1220 0%, #090e1a 100%);
    flex-shrink: 0;
  }
  header .logo {
    width: 36px; height: 36px;
    background: conic-gradient(from 135deg, var(--accent), var(--accent3), var(--accent2), var(--accent));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  header h1 {
    font-family: 'DM Mono', monospace;
    font-weight: 400;
    font-size: 1rem;
    letter-spacing: 0.04em;
    color: var(--text);
  }
  header h1 span { color: var(--accent); }
  .header-tag {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 61px);
  }

  /* ── Sidebar ── */
  aside {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 22px 18px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 0.78rem;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    padding: 1px 7px;
    border-radius: 4px;
    border: 1px solid;
  }
  .badge-eq  { color: var(--accent3); border-color: var(--accent3); }
  .badge-ineq{ color: var(--accent2); border-color: var(--accent2); }
  .badge-obj { color: var(--accent);  border-color: var(--accent); }

  input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    padding: 8px 12px;
    border-radius: 7px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,158,255,.12);
  }

  .constraint-row {
    display: flex;
    gap: 6px;
    align-items: center;
    animation: fadeIn .25s ease;
  }
  .constraint-row input { flex: 1; }
  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    flex-shrink: 0;
  }
  .icon-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .add-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    width: 100%;
    padding: 7px;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    transition: all .2s;
    margin-top: 4px;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); }

  .range-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .range-row .field label { font-size: 0.72rem; color: var(--muted); }

  .plot-btn {
    background: linear-gradient(135deg, var(--accent), #2070cc);
    border: none;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    letter-spacing: 0.03em;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    width: 100%;
    margin-top: auto;
  }
  .plot-btn:hover { opacity: 0.9; }
  .plot-btn:active { transform: scale(0.98); }
  .plot-btn:disabled { opacity: .5; cursor: wait; }

  .error-box {
    background: rgba(255,80,80,.1);
    border: 1px solid rgba(255,80,80,.4);
    color: #ff8888;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 8px 12px;
    border-radius: 7px;
    display: none;
    line-height: 1.5;
  }

  /* ── Main plot area ── */
  main {
    display: grid;
    grid-template-rows: 1fr 1fr;
    overflow: hidden;
  }
  .plot-wrapper {
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
  }
  .plot-wrapper:last-child { border-bottom: none; }
  .plot-label {
    position: absolute;
    top: 12px; left: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    z-index: 10;
    pointer-events: none;
  }
  #plot3d, #plot2d { width: 100%; height: 100%; }

  /* ── Presets ── */
  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .preset-btn {
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .2s;
    text-align: left;
    line-height: 1.4;
  }
  .preset-btn:hover { border-color: var(--accent); color: var(--text); }
  .preset-btn strong { display: block; color: var(--accent); font-size: 0.7rem; }

  /* ── Legend ── */
  .legend {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .swatch {
    width: 28px; height: 3px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .swatch.feasible { background: rgba(255,107,107,0.8); height: 10px; border-radius: 3px; }
  .swatch.eq  { background: var(--accent3); }
  .swatch.ineq { background: var(--accent2); border-top: 2px dashed var(--accent2); background: none; }

  /* ── Scrollbar ── */
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

  /* ── Separator ── */
  .sep { border: none; border-top: 1px solid var(--border); margin: 0; }

  @media (max-width: 800px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; }
    aside { max-height: 60vh; }
    main { height: 70vh; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">∇</div>
  <h1>Constrained Optimization <span>Visualizer</span></h1>
  <span class="header-tag">f : ℝ² → ℝ</span>
</header>

<div class="app">
  <!-- ── Sidebar ── -->
  <aside>

    <!-- Presets -->
    <div>
      <div class="section-label">Quick Presets</div>
      <div class="preset-grid" id="presets"></div>
    </div>

    <hr class="sep"/>

    <!-- Objective -->
    <div>
      <div class="section-label">Objective Function</div>
      <div class="field">
        <label><span class="badge badge-obj">f(x₁,x₂)</span></label>
        <input type="text" id="f-input" value="x1^2 + x2^2" placeholder="e.g. sin(x1)*cos(x2)"/>
      </div>
    </div>

    <hr class="sep"/>

    <!-- Equality constraints -->
    <div>
      <div class="section-label">Equality Constraints <span style="color:var(--accent3);font-size:.6rem">g(x)=0</span></div>
      <div id="eq-list" style="display:flex;flex-direction:column;gap:6px;"></div>
      <button class="add-btn" onclick="addConstraint('eq')">+ add equality</button>
    </div>

    <hr class="sep"/>

    <!-- Inequality constraints -->
    <div>
      <div class="section-label">Inequality Constraints <span style="color:var(--accent2);font-size:.6rem">h(x)≤0</span></div>
      <div id="ineq-list" style="display:flex;flex-direction:column;gap:6px;"></div>
      <button class="add-btn" onclick="addConstraint('ineq')">+ add inequality</button>
    </div>

    <hr class="sep"/>

    <!-- Domain -->
    <div>
      <div class="section-label">Domain</div>
      <div class="range-row">
        <div class="field"><label>x₁ min</label><input type="number" id="x1min" value="-3" step="0.5"/></div>
        <div class="field"><label>x₁ max</label><input type="number" id="x1max" value="3"  step="0.5"/></div>
        <div class="field"><label>x₂ min</label><input type="number" id="x2min" value="-3" step="0.5"/></div>
        <div class="field"><label>x₂ max</label><input type="number" id="x2max" value="3"  step="0.5"/></div>
        <div class="field" style="grid-column:1/-1"><label>Grid resolution</label><input type="number" id="ngrid" value="120" min="40" max="300" step="20"/></div>
      </div>
    </div>

    <hr class="sep"/>

    <!-- Legend -->
    <div>
      <div class="section-label">Legend</div>
      <div class="legend">
        <div class="legend-item"><div class="swatch feasible"></div> Feasible set X</div>
        <div class="legend-item"><div class="swatch" style="background:var(--accent3)"></div> Equality g(x)=0</div>
        <div class="legend-item"><div class="swatch" style="height:0;border-top:2px dashed var(--accent2);width:28px"></div> Inequality h(x)=0 boundary</div>
      </div>
    </div>

    <div id="error-box" class="error-box"></div>

    <button class="plot-btn" id="plot-btn" onclick="runPlot()">Plot ↗</button>
  </aside>

  <!-- ── Plots ── -->
  <main>
    <div class="plot-wrapper">
      <div class="plot-label">3D Surface · f(x₁,x₂)</div>
      <div id="plot3d"></div>
    </div>
    <div class="plot-wrapper">
      <div class="plot-label">2D Feasible Set</div>
      <div id="plot2d"></div>
    </div>
  </main>
</div>

<script>
// ── Presets ──────────────────────────────────────────────────────────────────
const PRESETS = [
  {
    name:'Paraboloid', desc:'disk + quadrant',
    f:'x1^2 + x2^2',
    eq:[], ineq:['x1^2 + x2^2 - 4', '-x1', '-x2'],
    domain:[-3,3,-3,3]
  },
  {
    name:'Rosenbrock', desc:'disk constraint',
    f:'(1-x1)^2 + 100*(x2-x1^2)^2',
    eq:[], ineq:['x1^2 + x2^2 - 2.25'],
    domain:[-2,2,-2,2]
  },
  {
    name:'Saddle', desc:'linear equality',
    f:'x1^2 - x2^2',
    eq:['x1 + x2 - 1'], ineq:['x1^2+x2^2-9'],
    domain:[-3,3,-3,3]
  },
  {
    name:'Himmelblau', desc:'box constraints',
    f:'(x1^2+x2-11)^2+(x1+x2^2-7)^2',
    eq:[], ineq:['x1-4','-x1-1','x2-4','-x2-1'],
    domain:[-2,5,-2,5]
  },
  {
    name:'Sine waves', desc:'strip region',
    f:'sin(x1)*cos(x2)',
    eq:[], ineq:['x1-2','-x1-2','x2-1.5','-x2-1.5'],
    domain:[-3.5,3.5,-3.5,3.5]
  },
  {
    name:'Linear', desc:'polytope',
    f:'2*x1 + 3*x2',
    eq:[], ineq:['-x1','-x2','x1+2*x2-4','2*x1+x2-5'],
    domain:[-0.5,4,-0.5,4]
  },
];

// ── Constraint list management ────────────────────────────────────────────────
let eqRows = [], ineqRows = [];

function addConstraint(type, val='') {
  const list = document.getElementById(type+'-list');
  const arr  = type==='eq' ? eqRows : ineqRows;
  const color= type==='eq' ? 'var(--accent3)' : 'var(--accent2)';
  const label= type==='eq' ? '= 0' : '≤ 0';
  const id   = Date.now();

  const row = document.createElement('div');
  row.className = 'constraint-row';
  row.dataset.id = id;
  row.innerHTML = `
    <input type="text" value="${val}" placeholder="expression ${label}" style="border-color:${color}22;"/>
    <button class="icon-btn" onclick="removeConstraint('${type}',${id})" title="Remove">✕</button>`;
  list.appendChild(row);
  arr.push({id, el: row});
  return row.querySelector('input');
}

function removeConstraint(type, id) {
  const arr = type==='eq' ? eqRows : ineqRows;
  const idx = arr.findIndex(r=>r.id===id);
  if(idx>-1){ arr[idx].el.remove(); arr.splice(idx,1); }
}

function getConstraints(type) {
  const arr = type==='eq' ? eqRows : ineqRows;
  return arr.map(r=>r.el.querySelector('input').value.trim()).filter(Boolean);
}

function clearConstraints(type) {
  const arr  = type==='eq' ? eqRows : ineqRows;
  const list = document.getElementById(type+'-list');
  list.innerHTML='';
  arr.length=0;
}

// ── Preset rendering ──────────────────────────────────────────────────────────
function buildPresets() {
  const grid = document.getElementById('presets');
  PRESETS.forEach(p=>{
    const btn = document.createElement('button');
    btn.className='preset-btn';
    btn.innerHTML=`<strong>${p.name}</strong>${p.desc}`;
    btn.onclick=()=>loadPreset(p);
    grid.appendChild(btn);
  });
}

function loadPreset(p) {
  document.getElementById('f-input').value = p.f;
  clearConstraints('eq'); clearConstraints('ineq');
  p.eq.forEach(v=>addConstraint('eq',v));
  p.ineq.forEach(v=>addConstraint('ineq',v));
  document.getElementById('x1min').value=p.domain[0];
  document.getElementById('x1max').value=p.domain[1];
  document.getElementById('x2min').value=p.domain[2];
  document.getElementById('x2max').value=p.domain[3];
  runPlot();
}

// ── Math evaluation ───────────────────────────────────────────────────────────
function compileExpr(str) {
  // Replace ^ with ** handled by mathjs; allow x1,x2
  return math.compile(str.replace(/x1/g,'x1').replace(/x2/g,'x2'));
}

function evalGrid(exprStr, X1, X2) {
  const n = X1.length;
  const code = compileExpr(exprStr);
  const out = new Float64Array(n*n);
  for(let i=0;i<n;i++) for(let j=0;j<n;j++)
    out[i*n+j] = code.evaluate({x1:X1[j], x2:X2[i]});
  return out;
}

// ── Core plotting ─────────────────────────────────────────────────────────────
function linspace(a,b,n){
  const arr=[]; for(let i=0;i<n;i++) arr.push(a+(b-a)*i/(n-1)); return arr;
}

function showError(msg){ const e=document.getElementById('error-box'); e.textContent=msg; e.style.display=msg?'block':'none'; }

async function runPlot(){
  showError('');
  const btn=document.getElementById('plot-btn');
  btn.disabled=true; btn.textContent='Computing…';

  // tiny delay to let UI repaint
  await new Promise(r=>setTimeout(r,20));

  try{
    const fStr   = document.getElementById('f-input').value.trim();
    const eqStrs = getConstraints('eq');
    const iqStrs = getConstraints('ineq');

    const x1min=+document.getElementById('x1min').value;
    const x1max=+document.getElementById('x1max').value;
    const x2min=+document.getElementById('x2min').value;
    const x2max=+document.getElementById('x2max').value;
    const N    =+document.getElementById('ngrid').value;

    const X1=linspace(x1min,x1max,N);
    const X2=linspace(x2min,x2max,N);

    // Build Z grid (row-major: Z[i][j] = f(X1[j],X2[i]))
    const Fflat=evalGrid(fStr,X1,X2);
    const Z=[]; for(let i=0;i<N;i++){const row=[]; for(let j=0;j<N;j++) row.push(Fflat[i*N+j]); Z.push(row);}

    // Feasibility
    const EPS_EQ=0.08;
    const feasible=new Uint8Array(N*N).fill(1);

    for(const s of eqStrs){
      const vals=evalGrid(s,X1,X2);
      for(let k=0;k<N*N;k++) if(Math.abs(vals[k])>EPS_EQ) feasible[k]=0;
    }
    for(const s of iqStrs){
      const vals=evalGrid(s,X1,X2);
      for(let k=0;k<N*N;k++) if(vals[k]>0) feasible[k]=0;
    }

    // Feasible Z (NaN where infeasible)
    const Zfeas=[]; for(let i=0;i<N;i++){const row=[]; for(let j=0;j<N;j++) row.push(feasible[i*N+j]?Fflat[i*N+j]:NaN); Zfeas.push(row);}

    // Heatmap matrix for 2D feasibility overlay
    // We'll use a contour/heatmap approach
    const fMin=Math.min(...Fflat.filter(isFinite));
    const fMax=Math.max(...Fflat.filter(isFinite));

    // ── 3D Plot ──────────────────────────────────────────────────────────────
    const trace3dSurface = {
      type:'surface', x:X1, y:X2, z:Z,
      colorscale:'Viridis',
      opacity:0.85,
      showscale:true,
      colorbar:{
        title:{text:'f(x₁,x₂)', side:'right', font:{color:'#c8d4f0',size:11}},
        tickfont:{color:'#c8d4f0',size:10},
        x:1.02,
        bgcolor:'rgba(0,0,0,0)',
        bordercolor:'#1e2840',
      },
      contours:{z:{show:true,usecolormap:true,highlightcolor:'white',project:{z:true}}},
      hovertemplate:'x₁=%{x:.2f}<br>x₂=%{y:.2f}<br>f=%{z:.4f}<extra></extra>',
    };

    const trace3dFeas = {
      type:'surface', x:X1, y:X2, z:Zfeas,
      colorscale:[[0,'rgba(255,100,100,0.7)'],[1,'rgba(255,160,100,0.7)']],
      showscale:false,
      opacity:0.7,
      hovertemplate:'x₁=%{x:.2f}<br>x₂=%{y:.2f}<br>f=%{z:.4f} ✓<extra>Feasible</extra>',
    };

    const layout3d = {
      paper_bgcolor:'#080b14', plot_bgcolor:'#080b14',
      margin:{l:0,r:0,t:30,b:0},
      scene:{
        bgcolor:'#080b14',
        xaxis:{title:'x₁', color:'#c8d4f0', gridcolor:'#1e2840', showbackground:false},
        yaxis:{title:'x₂', color:'#c8d4f0', gridcolor:'#1e2840', showbackground:false},
        zaxis:{title:'f(x₁,x₂)', color:'#c8d4f0', gridcolor:'#1e2840', showbackground:false},
        camera:{eye:{x:1.5,y:-1.5,z:1.2}},
      },
      showlegend:false,
    };

    Plotly.react('plot3d',[trace3dSurface, trace3dFeas],layout3d,{responsive:true,displayModeBar:false});

    // ── 2D Plot ──────────────────────────────────────────────────────────────
    // Background: f heatmap
    const trace2dBg = {
      type:'heatmap', x:X1, y:X2, z:Z,
      colorscale:'Viridis',
      opacity:0.75,
      showscale:false,
      hovertemplate:'x₁=%{x:.2f}<br>x₂=%{y:.2f}<br>f=%{z:.4f}<extra></extra>',
    };

    // f contour lines
    const trace2dContour = {
      type:'contour', x:X1, y:X2, z:Z,
      colorscale:'Greys',
      showscale:false,
      contours:{coloring:'none', showlabels:false},
      line:{width:0.8, color:'rgba(255,255,255,0.25)'},
      opacity:0.6,
      ncontours:20,
      hoverinfo:'skip',
    };

    // Feasibility as heatmap overlay
    const FeasZ=[]; for(let i=0;i<N;i++){const row=[]; for(let j=0;j<N;j++) row.push(feasible[i*N+j]?1:0); FeasZ.push(row);}
    const trace2dFeas = {
      type:'heatmap', x:X1, y:X2, z:FeasZ,
      colorscale:[[0,'rgba(0,0,0,0)'],[1,'rgba(255,100,100,0.45)']],
      showscale:false,
      hoverinfo:'skip',
      zmin:0, zmax:1,
    };

    const traces2d=[trace2dBg, trace2dContour, trace2dFeas];

    // Equality constraint curves
    const EQ_COLORS=['#3dffc0','#7affaa','#00e5cc'];
    eqStrs.forEach((s,i)=>{
      const v=evalGrid(s,X1,X2);
      const Zg=[]; for(let ii=0;ii<N;ii++){const row=[]; for(let jj=0;jj<N;jj++) row.push(v[ii*N+jj]); Zg.push(row);}
      traces2d.push({
        type:'contour', x:X1, y:X2, z:Zg,
        contours:{coloring:'none', start:0, end:0, size:1},
        line:{width:2.5, color:EQ_COLORS[i%EQ_COLORS.length]},
        showscale:false,
        name:`g${i+1}(x)=0`,
        hovertemplate:`g${i+1}(x)=%{z:.3f}<extra></extra>`,
      });
    });

    // Inequality boundaries
    const IQ_COLORS=['#ff6b6b','#ff9f43','#ee5a24','#fd79a8'];
    iqStrs.forEach((s,i)=>{
      const v=evalGrid(s,X1,X2);
      const Zh=[]; for(let ii=0;ii<N;ii++){const row=[]; for(let jj=0;jj<N;jj++) row.push(v[ii*N+jj]); Zh.push(row);}
      traces2d.push({
        type:'contour', x:X1, y:X2, z:Zh,
        contours:{coloring:'none', start:0, end:0, size:1},
        line:{width:2, color:IQ_COLORS[i%IQ_COLORS.length], dash:'dot'},
        showscale:false,
        name:`h${i+1}(x)=0 boundary`,
        hovertemplate:`h${i+1}(x)=%{z:.3f}<extra></extra>`,
      });
    });

    // Colorbar trace (invisible, just for scale)
    traces2d.push({
      type:'heatmap', x:[X1[0]], y:[X2[0]], z:[[fMin],[fMax]],
      colorscale:'Viridis',
      showscale:true,
      colorbar:{
        title:{text:'f(x₁,x₂)', side:'right', font:{color:'#c8d4f0',size:11}},
        tickfont:{color:'#c8d4f0',size:10},
        bgcolor:'rgba(0,0,0,0)',
        bordercolor:'#1e2840',
        x:1.01,
      },
      opacity:0,
      hoverinfo:'skip',
    });

    const layout2d={
      paper_bgcolor:'#080b14', plot_bgcolor:'#080b14',
      margin:{l:50,r:80,t:20,b:50},
      xaxis:{
        title:{text:'x₁',font:{color:'#c8d4f0'}},
        color:'#c8d4f0', gridcolor:'#1e2840',
        zerolinecolor:'#2a3555',
      },
      yaxis:{
        title:{text:'x₂',font:{color:'#c8d4f0'}},
        color:'#c8d4f0', gridcolor:'#1e2840',
        zerolinecolor:'#2a3555',
      },
      showlegend:false,
    };

    Plotly.react('plot2d', traces2d, layout2d, {responsive:true, displayModeBar:false});

  } catch(e){
    showError('⚠ ' + e.message);
  }

  btn.disabled=false; btn.textContent='Plot ↗';
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildPresets();

// Load default (Paraboloid)
loadPreset(PRESETS[0]);
</script>
</body>
